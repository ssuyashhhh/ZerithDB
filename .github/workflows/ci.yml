name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Minimal permissions — least privilege by default
permissions:
  contents: read

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1

# Cancel in-progress runs for the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & Format ────────────────────────────────────────────────────────
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm turbo lint

      - name: Format check (Prettier)
        run: pnpm format:check

  # ── 2. TypeScript type-check ────────────────────────────────────────────────
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeCheck (tsc)
        run: pnpm turbo typecheck

  # ── 3. Build & Unit Tests ───────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Run unit tests (Vitest)
        run: pnpm turbo test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage/**"
          retention-days: 7

  # ── 4. Python SDK ───────────────────────────────────────────────────────────
  python-sdk:
    name: Python SDK (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/zerithdb-python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install SDK with dev extras
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src

      - name: Type check (mypy)
        run: mypy src --ignore-missing-imports --no-strict-optional --allow-untyped-defs --allow-untyped-calls

      - name: Test (pytest)
        run: pytest --tb=short -q

  # ── 5. CI Summary Gate ──────────────────────────────────────────────────────
  # This is the single required status check to add in branch protection rules.
  # All jobs must pass for this to succeed.
  ci-success:
    name: CI Passed
    needs: [lint-format, typecheck, build-and-test, python-sdk]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more CI jobs failed. Please check the logs above."
            exit 1
          fi
          echo "✅ All CI checks passed!"
