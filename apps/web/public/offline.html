<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>ZerithDB offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      main {
        width: min(100%, 36rem);
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        background: #ffffff;
        padding: 2rem;
        box-shadow: 0 1.5rem 4rem rgb(15 23 42 / 10%);
      }

      img {
        width: 3rem;
        height: 3rem;
      }

      h1 {
        margin: 1.5rem 0 0.75rem;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #4b5563;
        font-size: 1rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 1.5rem;
        border-radius: 999px;
        background: #111827;
        padding: 0.75rem 1rem;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.svg" alt="ZerithDB" />
      <h1>You are offline</h1>
      <p>
        ZerithDB cached the app shell so you can keep exploring the site while your connection is
        unavailable. Some live resources may refresh once you are back online.
      </p>
      <a href="/">Return home</a>
    </main>
  </body>
</html>
